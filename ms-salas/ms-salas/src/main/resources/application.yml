server:
  port: 8082

spring:
  application:
    name: ms-salas

  datasource:
    url: jdbc:mysql://localhost:3306/reserva_salas_db
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
