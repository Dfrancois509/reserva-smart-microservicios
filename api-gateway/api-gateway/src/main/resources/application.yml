server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-usuarios-route
              uri: lb://ms-usuarios
              predicates:
                - Path=/api/usuarios/**
              filters:
                - StripPrefix=1

            - id: ms-salas-route
              uri: lb://ms-salas
              predicates:
                - Path=/api/salas/**
              filters:
                - StripPrefix=1

            - id: ms-reservas-route
              uri: lb://ms-reservas
              predicates:
                - Path=/api/reservas/**
              filters:
                - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info